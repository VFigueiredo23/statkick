name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose --env-file docker.env.prod.example -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build production images
        run: docker compose --env-file docker.env.prod.example -f docker-compose.yml -f docker-compose.prod.yml build backend frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          set -eu
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" "mkdir -p '${VPS_PATH}'"

      - name: Sync project to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          set -eu
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'backend/__pycache__' \
            --exclude 'backend/**/*.pyc' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'media' \
            --exclude 'videos' \
            --exclude 'clipes' \
            -e "ssh -p ${VPS_PORT:-22}" \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_PATH}"

      - name: Run remote deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          DEPLOY_GIT_SHA: ${{ github.sha }}
          DEPLOY_GIT_REF: ${{ github.ref_name }}
        run: |
          set -eu
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "cd '${VPS_PATH}' && DEPLOY_GIT_SHA='${DEPLOY_GIT_SHA}' DEPLOY_GIT_REF='${DEPLOY_GIT_REF}' bash ./scripts/deploy-vps.sh"
