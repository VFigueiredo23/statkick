services:
  db:
    image: postgres:16-alpine
    container_name: statkick_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-statkick}
      POSTGRES_USER: ${POSTGRES_USER:-statkick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statkick}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-statkick} -d ${POSTGRES_DB:-statkick}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statkick_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-statkick-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_CORS_ALLOW_ALL_ORIGINS: ${DJANGO_CORS_ALLOW_ALL_ORIGINS:-1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-0}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-0}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-0}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-0}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-0}
      POSTGRES_DB: ${POSTGRES_DB:-statkick}
      POSTGRES_USER: ${POSTGRES_USER:-statkick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statkick}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_CREATE_SUPERUSER: ${DJANGO_CREATE_SUPERUSER:-0}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@statkick.local}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      DJANGO_SUPERUSER_NOME: ${DJANGO_SUPERUSER_NOME:-Administrador}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - ./media:/app/media
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: statkick_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
